meteo:
  latent_environment:
    random_seed: 1201
    initial_regime: stable_dry
    thermal_scenario: warm
    moisture_scenario: dry
    regime_persistence: 0.90
    spell_memory: 0.95

  storm_birth:
    expected_births_per_step: 0.45
    mean_peak_intensity_mmph: 9.0
    mean_duration_steps: 4
    band_cluster_probability: 0.10

  background:
    enabled: true
    random_seed: 2201
    temporal_persistence: 0.80
    max_intensity_mm_dt: 0.6

  temperature:
    enabled: true
    random_seed: 4201
    gradient_amplitude_c: 0.85

energy:
  latitude_deg: 40.0
  pet:
    pet_multiplier: 1.15

hydro:
  soil:
    capacity_mm: 180.0
    initial_relative: 0.35
    max_infiltration_mm_dt: 20.0
    percolation_rate_mm_dt: 2.0

  runoff:
    subsurface_runoff_fraction: 1.0

routing:
  enable_reservoirs: true
  channel:
    channel_time_constant_hours: 1.2
  reservoir_rules:
    min_release_m3s: 0.05
    target_release_m3s: 0.8

obs:
  random_seed: 3201

  precipitation:
    enabled: true
    noise_std_mm_dt: 0.12
    missing_probability: 0.02
    detection_threshold_mm_dt: 0.05

  discharge:
    enabled: true
    relative_noise_std: 0.08
    missing_probability: 0.02
    detection_threshold_m3s: 0.05

  reservoir_storage:
    enabled: true
    noise_std_m3: 15000.0
