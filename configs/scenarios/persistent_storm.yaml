meteo:
  latent_environment:
    random_seed: 1301
    initial_regime: frontal_persistent
    thermal_scenario: normal
    moisture_scenario: wet
    regime_persistence: 0.95
    spell_memory: 0.97

  storm_birth:
    expected_births_per_step: 1.25
    mean_peak_intensity_mmph: 14.0
    mean_duration_steps: 8
    band_cluster_probability: 0.60

  background:
    enabled: true
    random_seed: 2301
    temporal_persistence: 0.92
    max_intensity_mm_dt: 2.2

  temperature:
    enabled: true
    random_seed: 4301
    gradient_amplitude_c: 0.70

energy:
  latitude_deg: 40.0
  pet:
    pet_multiplier: 1.0

hydro:
  soil:
    capacity_mm: 180.0
    initial_relative: 0.70
    max_infiltration_mm_dt: 15.0
    percolation_rate_mm_dt: 3.5

  runoff:
    subsurface_runoff_fraction: 1.0

routing:
  enable_reservoirs: true
  channel:
    channel_time_constant_hours: 0.85
  reservoir_rules:
    min_release_m3s: 0.25
    target_release_m3s: 2.0

obs:
  random_seed: 3301

  precipitation:
    enabled: true
    noise_std_mm_dt: 0.18
    missing_probability: 0.02
    detection_threshold_mm_dt: 0.05

  discharge:
    enabled: true
    relative_noise_std: 0.09
    missing_probability: 0.02
    detection_threshold_m3s: 0.10

  reservoir_storage:
    enabled: true
    noise_std_m3: 18000.0
