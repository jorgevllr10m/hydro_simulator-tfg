meteo:
  latent_environment:
    random_seed: 1601
    initial_regime: frontal_persistent
    thermal_scenario: warm
    moisture_scenario: wet
    regime_persistence: 0.88
    spell_memory: 0.90

  storm_birth:
    expected_births_per_step: 1.15
    mean_peak_intensity_mmph: 20.0
    mean_duration_steps: 8
    band_cluster_probability: 0.70

  background:
    enabled: true
    random_seed: 2601
    temporal_persistence: 0.88
    max_intensity_mm_dt: 3.0

  temperature:
    enabled: true
    random_seed: 4601
    gradient_amplitude_c: 0.85

energy:
  latitude_deg: 40.0
  pet:
    pet_multiplier: 1.05

hydro:
  soil:
    capacity_mm: 180.0
    initial_relative: 0.78
    max_infiltration_mm_dt: 12.0
    percolation_rate_mm_dt: 4.0

  runoff:
    subsurface_runoff_fraction: 1.0

routing:
  enable_reservoirs: true
  channel:
    channel_time_constant_hours: 0.75
  reservoir_rules:
    min_release_m3s: 0.3
    target_release_m3s: 2.5

obs:
  random_seed: 3601

  precipitation:
    enabled: true
    noise_std_mm_dt: 0.20
    missing_probability: 0.02
    detection_threshold_mm_dt: 0.05

  discharge:
    enabled: true
    relative_noise_std: 0.10
    missing_probability: 0.02
    detection_threshold_m3s: 0.10

  reservoir_storage:
    enabled: true
    noise_std_m3: 20000.0
